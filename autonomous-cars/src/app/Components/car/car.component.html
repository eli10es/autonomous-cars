<div class="container">
  <div>
    <h2 class="header">{{ model }} (ID: {{ ID }})</h2>
    <div>
      <div class="label">
        <label for="">Model:</label>
        <p>{{ model }}</p>
      </div>
      <div class="label">
        <label for="">X:</label>
        <p>{{ x }}</p>
      </div>
      <div class="label">
        <label for="">Y:</label>
        <p>{{ y }}</p>
      </div>
      <div class="label">
        <label for="">Speed:</label>
        <p>{{ speed }}</p>
      </div>
    </div>
  </div>

  <button class="btn" (click)="getClosestCar()">Get Closest Car</button>
  <div class="speed-input">
    <input type="text" id="newSpeed" #newSpeed />
    <button class="btn" (click)="changeSpeed(newSpeed.value)">
      Change Speed
    </button>
  </div>

  <select name="events">
    @for (event of encounteredEvents; track event) {
      <option value="">{{ event }}</option>
    }
  </select>
  <select name="" id="">
    @for (car of getCars(); track car) {
      <option value="">{{ car.model }} {{ car.ID }}</option>
    }
  </select>
  <button class="btn">Send Event</button>
</div>
